# ============================================
# Pipeline CI/CD — Worker → ECS Fargate
# ============================================

name: Build and Deploy Worker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'poc'
        type: choice
        options:
          - poc
          - production
      deploy_only:
        description: 'Skip build, only deploy'
        required: false
        default: false
        type: boolean

env:
  AWS_REGION: eu-west-1
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY_WORKER }}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ !(github.event.inputs.deploy_only == 'true') }}
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          TAG="${GITHUB_SHA::8}-$(date +%Y%m%d%H%M%S)"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          docker build \
            --build-arg APP_VERSION=${{ steps.meta.outputs.tag }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest \
            .
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

  deploy:
    name: Deploy to ECS
    needs: [build]
    if: ${{ always() && (needs.build.result == 'success' || github.event.inputs.deploy_only == 'true') && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine environment
        id: env
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment || 'poc' }}"
          echo "name=$ENVIRONMENT" >> $GITHUB_OUTPUT

      - name: Determine image tag
        id: image
        run: |
          if [ "${{ github.event.inputs.deploy_only }}" == "true" ]; then
            TAG="latest"
          else
            TAG="${{ needs.build.outputs.image_tag }}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Get current task definition
        id: task-def
        run: |
          TASK_FAMILY="tickets-platform-${{ steps.env.outputs.name }}-worker"

          # Download current task definition
          aws ecs describe-task-definition \
            --task-definition "$TASK_FAMILY" \
            --query 'taskDefinition' \
            --output json > task-def.json

          # Remove fields that can't be re-registered
          jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)' \
            task-def.json > clean-task-def.json

      - name: Update image in task definition
        id: new-task
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.image.outputs.tag }}"

          # Update the image in the container definition
          jq --arg IMG "$IMAGE" '.containerDefinitions[0].image = $IMG' \
            clean-task-def.json > new-task-def.json

          # Register the new task definition
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json file://new-task-def.json \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          echo "arn=$NEW_ARN" >> $GITHUB_OUTPUT
          echo "Registered new task definition: $NEW_ARN"

      - name: Update ECS Worker service
        run: |
          CLUSTER_NAME="tickets-platform-${{ steps.env.outputs.name }}-cluster"
          SERVICE_NAME="tickets-platform-${{ steps.env.outputs.name }}-worker"

          echo "Updating ECS Worker service: $SERVICE_NAME in cluster: $CLUSTER_NAME"

          aws ecs update-service \
            --cluster "$CLUSTER_NAME" \
            --service "$SERVICE_NAME" \
            --task-definition "${{ steps.new-task.outputs.arn }}" \
            --force-new-deployment

      - name: Wait for Worker service to be stable
        run: |
          CLUSTER_NAME="tickets-platform-${{ steps.env.outputs.name }}-cluster"
          SERVICE_NAME="tickets-platform-${{ steps.env.outputs.name }}-worker"

          echo "Waiting for Worker service to become stable..."

          aws ecs wait services-stable \
            --cluster "$CLUSTER_NAME" \
            --services "$SERVICE_NAME"

          echo "✅ Worker service is stable!"

      - name: Check Worker logs
        run: |
          echo "Checking recent worker logs..."
          
          aws logs tail /ecs/tickets-platform-${{ steps.env.outputs.name }}-worker \
            --since 2m \
            --format short \
            --max-items 20 || echo "No logs available yet"

# ============================================
# Secrets necesarios en el repo:
#   AWS_ROLE_ARN            -> IAM role para GitHub Actions
#   ECR_REGISTRY            -> <ACCOUNT_ID>.dkr.ecr.eu-west-1.amazonaws.com
#   ECR_REPOSITORY_WORKER   -> tickets-platform-poc/worker
#
# Este workflow despliega SOLO el Worker (proceso independiente)
# ============================================
